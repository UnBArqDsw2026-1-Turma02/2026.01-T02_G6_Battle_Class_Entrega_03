<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Battle Class — Padrões de Projeto (Entrega 03)</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação do projeto Battle Class — UnB/FGA · G6 · 2026.1 · Entrega 03 (Padrões de Projeto GoF)">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tema base Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Design System -->
  <link rel="stylesheet" href="custom.css">

  <!-- KaTeX (renderização de matemática LaTeX) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
  <!-- Topbar fixa -->
  <header id="bc-topbar">
    <div class="bc-topbar-left">
      <button class="bc-hamburger" id="bc-toggle" aria-label="Abrir/fechar menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <span class="bc-title">Battle Class</span>
    </div>
    <span class="bc-context">UnB/FGA &middot; G6 &middot; 2026.1 &middot; Entrega 03</span>
  </header>

  <div id="app"></div>

  <script>
    // Plugin: caret ▸/▾ para grupos, expansão automática da página ativa
    function bcSidebarTogglePlugin(hook, vm) {
      function decorateSidebar() {
        var nav = document.querySelector('.sidebar-nav');
        if (!nav) return;

        nav.querySelectorAll('li').forEach(function (li) {
          var direct = li.querySelector(':scope > p > strong, :scope > strong');
          var subUl = li.querySelector(':scope > ul');
          if (direct && subUl) {
            li.classList.add('bc-group');
          }
          var anchor = li.querySelector(':scope > a');
          if (anchor && subUl && !direct) {
            li.classList.add('bc-has-children');
          }
        });

        nav.querySelectorAll('li.bc-group > p, li.bc-group > strong').forEach(function (el) {
          el.style.cursor = 'pointer';
          el.addEventListener('click', function (e) {
            e.preventDefault();
            el.closest('li').classList.toggle('bc-open');
          });
        });
        nav.querySelectorAll('li.bc-has-children > a').forEach(function (a) {
          a.addEventListener('click', function () {
            a.parentElement.classList.toggle('bc-open');
          });
        });

        var active = nav.querySelector('li.active, a.active');
        if (active) {
          var node = active.closest('li');
          while (node) {
            if (node.classList.contains('bc-group') || node.classList.contains('bc-has-children')) {
              node.classList.add('bc-open');
            }
            node = node.parentElement && node.parentElement.closest('li');
          }
        }
      }

      hook.doneEach(function () {
        decorateSidebar();
        document.querySelectorAll('.markdown-section table').forEach(function (t) {
          t.style.display = 'table';
          t.style.width = '100%';
        });
      });
    }

    window.$docsify = {
      name: 'Battle Class',
      repo: 'https://github.com/UnBArqDsw2026-1-Turma02/2026.01-T02_G6_Battle_Class_Entrega_03',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#2B6BE6',
      search: {
        placeholder: 'Buscar...',
        noData: 'Sem resultados.',
        depth: 3
      },
      plugins: [bcSidebarTogglePlugin]
    };

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('bc-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        if (window.matchMedia('(max-width: 768px)').matches) {
          document.body.classList.toggle('bc-sidebar-open');
        } else {
          document.body.classList.toggle('bc-sidebar-collapsed');
        }
      });
    });
  </script>

  <!-- Docsify v4 + plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- KaTeX + docsify-katex -->
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.js"></script>
</body>
</html>
